version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutriplan_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nutriplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nutrition-service:
    build:
      context: ./NutritionService
      dockerfile: Dockerfile
    container_name: nutriplan_nutrition
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=nutriplan;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: nutriplan_notification
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - nutrition-service

volumes:
  postgres_data:
